  <script>
    // Restore URL after 404.html SPA redirect (GitHub Pages).
    // Must run before the router module so the URL is correct when it starts.
    (function () {
      var redirect = sessionStorage.getItem("redirect");
      if (redirect) {
        sessionStorage.removeItem("redirect");
        history.replaceState(null, "", redirect);
      }
    })();
  </script>

  <script>
    // GoatCounter: only track on production (GitHub Pages).
    // Skips localhost, Netlify PR previews, and test runs.
    window.goatcounter = { no_onload: true };
    if (window.location.host === 'danielabar.github.io') {
      var s = document.createElement('script');
      s.async = true;
      s.dataset.goatcounter = 'https://charitable-tax-credit-calculator-canada.goatcounter.com/count';
      s.src = '//gc.zgo.at/count.js';
      document.head.appendChild(s);
    }
  </script>
  <script type="module" src="js/app.js"></script>
</head>
